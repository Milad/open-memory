services:
  # Prepare host bind-mounted directories and permissions.
  fs-init:
    image: alpine:3.20
    container_name: open-memory-fs-init
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /workspace/data /workspace/backups /workspace/mcp-data
        chown -R 1000:1000 /workspace/data /workspace/backups /workspace/mcp-data
        chmod 700 /workspace/data
        chmod 700 /workspace/mcp-data
        chmod 775 /workspace/backups
    volumes:
      - ./postgres:/workspace
    networks:
      - default

  # The Database (Persistent Vector Store)
  db:
    image: timescale/timescaledb-ha:pg17
    container_name: open-memory-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_ADMIN_USER:?DB_ADMIN_USER is required}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:?DB_ADMIN_PASSWORD is required}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
      PGDATA: /var/lib/postgresql/data
      PGEDGE_MCP_DB_USER: ${MCP_DB_USER:?MCP_DB_USER is required}
      PGEDGE_MCP_DB_PASSWORD: ${MCP_DB_PASSWORD:?MCP_DB_PASSWORD is required}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    depends_on:
      fs-init:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
          - db
          - open-memory-db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_ADMIN_USER:?DB_ADMIN_USER is required} -d ${DB_NAME:?DB_NAME is required}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Install pgai DB objects and create the vectorizer once.
  pgai-installer:
    image: timescale/pgai-vectorizer-worker:v0.12.1
    container_name: open-memory-pgai-installer
    restart: "no"
    entrypoint: ["/pgai-init/installer.sh"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGAI_DB_HOST: db
      PGAI_DB_PORT: ${DB_PORT:?DB_PORT is required}
      PGAI_DB_DATABASE: ${DB_NAME:?DB_NAME is required}
      PGAI_DB_USER: ${DB_ADMIN_USER:?DB_ADMIN_USER is required}
      PGAI_DB_PASSWORD: ${DB_ADMIN_PASSWORD:?DB_ADMIN_PASSWORD is required}
    volumes:
      - ./pgai-init:/pgai-init:ro
    networks:
      - default

  # Background worker that keeps embeddings in sync.
  vectorizer-worker:
    image: timescale/pgai-vectorizer-worker:v0.12.1
    container_name: open-memory-vectorizer-worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      pgai-installer:
        condition: service_completed_successfully
    environment:
      PGAI_VECTORIZER_WORKER_DB_URL: postgres://${DB_ADMIN_USER:?DB_ADMIN_USER is required}:${DB_ADMIN_PASSWORD:?DB_ADMIN_PASSWORD is required}@db:${DB_PORT:?DB_PORT is required}/${DB_NAME:?DB_NAME is required}
      VOYAGE_API_KEY: ${PGEDGE_VOYAGE_API_KEY:?PGEDGE_VOYAGE_API_KEY is required}
    command: ["--poll-interval", "5s"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import os,psycopg; conn=psycopg.connect(os.environ[''PGAI_VECTORIZER_WORKER_DB_URL'']); cur=conn.cursor(); cur.execute(''SELECT 1 FROM ai.vectorizer LIMIT 1''); cur.fetchone(); conn.close()"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - default

  # The MCP Server (pulled from GitHub Container Registry)
  mcp:
    image: ghcr.io/pgedge/postgres-mcp:1.0.0
    container_name: open-memory-mcp
    restart: always
    environment:
      PGEDGE_DB_HOST: ${DB_HOST:?DB_HOST is required}
      PGEDGE_DB_PORT: ${DB_PORT:?DB_PORT is required}
      PGEDGE_DB_NAME: ${DB_NAME:?DB_NAME is required}
      PGEDGE_DB_USER: ${MCP_DB_USER:?MCP_DB_USER is required}
      PGEDGE_DB_PASSWORD: ${MCP_DB_PASSWORD:?MCP_DB_PASSWORD is required}
      PGEDGE_DB_SSLMODE: ${DB_SSLMODE:?DB_SSLMODE is required}
      PGEDGE_DB_ALLOW_WRITES: ${MCP_ALLOW_WRITES:?MCP_ALLOW_WRITES is required}
      PGEDGE_HTTP_ENABLED: ${HTTP_ENABLED:?HTTP_ENABLED is required}
      PGEDGE_HTTP_ADDRESS: ${HTTP_ADDRESS:?HTTP_ADDRESS is required}
      PGEDGE_TLS_ENABLED: ${TLS_ENABLED:?TLS_ENABLED is required}
      PGEDGE_LLM_ENABLED: false
      PGEDGE_EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:?EMBEDDING_ENABLED is required}
      PGEDGE_EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:?EMBEDDING_PROVIDER is required}
      PGEDGE_EMBEDDING_MODEL: ${EMBEDDING_MODEL:?EMBEDDING_MODEL is required}
      PGEDGE_VOYAGE_API_KEY: ${PGEDGE_VOYAGE_API_KEY:?PGEDGE_VOYAGE_API_KEY is required}
      PGEDGE_DATA_DIR: /app/data
      INIT_TOKENS: ${INIT_TOKENS:?INIT_TOKENS is required}
    ports:
      - "8080:8080" # MCP API
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      fs-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    volumes:
      - ./postgres/mcp-data:/app/data
    networks:
      default:
        aliases:
          - postgres-mcp
          - memory-mcp
          - mcp

  # Daily PostgreSQL backups
  pgbackups:
    image: prodrigestivill/postgres-backup-local:17
    container_name: open-memory-pgbackups
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: ${DB_PORT:?DB_PORT is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_ADMIN_USER:?DB_ADMIN_USER is required}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:?DB_ADMIN_PASSWORD is required}
      SCHEDULE: "@daily"
      TZ: "Europe/Stockholm"
      BACKUP_KEEP_DAYS: 15
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./postgres/backups:/backups
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default

networks:
  default:
    name: open-memory_default
